<!-- core/templates/core/login.html -->
{% extends 'core/base.html' %}

{% block title %}Вход — SchoolReddit{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Вход в аккаунт</h2>
                    <p class="text-muted">Добро пожаловать обратно!</p>
                </div>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="bi bi-person"></i> Имя пользователя
                        </label>
                        <input type="text"
                               name="username"
                               class="form-control form-control-lg"
                               placeholder="Введите логин"
                               required>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock"></i> Пароль
                        </label>
                        <input type="password"
                               name="password"
                               class="form-control form-control-lg"
                               placeholder="Введите пароль"
                               required>
                        <div class="text-end mt-2">
                            <a href="#" class="small text-decoration-none">Забыли пароль?</a>
                        </div>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-box-arrow-in-right"></i> Войти
                        </button>
                    </div>

                    <div class="text-center">
                        <p class="mb-0">
                            Нет аккаунта?
                            <a href="{% url 'register' %}" class="text-decoration-none fw-semibold">
                                Зарегистрироваться
                            </a>
                        </p>
                    </div>
                </form>
            </div>
        </div>

        <div class="card mt-3">
            <div class="card-body text-center">
                <div class="row">
                    <div class="col">
                        <a href="#" class="btn btn-outline-dark w-100">
                            <i class="bi bi-google"></i> Google
                        </a>
                    </div>
                    <div class="col">
                        <a href="#" class="btn btn-outline-primary w-100">
                            <i class="bi bi-microsoft"></i> Microsoft
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
